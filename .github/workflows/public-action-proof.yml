name: public-action-proof

# Proves the PUBLIC immutable Action tag Ecocitizenz/ecz-id-mcp-verifier@v0.8.2
# runs on a GitHub-hosted runner with least privilege. Read-only, reports only.
# Does not rebuild the action, does not use ./ or main, does not mutate the repo.

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/public-action-proof.yml"

permissions:
  contents: read

jobs:
  prove:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (read-only, to prove no source mutation)
        uses: actions/checkout@v4

      - name: OPEN (valid parent, offline)
        id: open
        uses: Ecocitizenz/ecz-id-mcp-verifier@v0.8.2
        with:
          target: "ECZ-GB-A93K7Q"
          policy: "OPEN"
          no-network: "true"

      - name: PREFER (valid child AGENT, offline)
        id: prefer
        uses: Ecocitizenz/ecz-id-mcp-verifier@v0.8.2
        with:
          target: "ECZ-GB-A93K7Q::AGENT-4F9Q2A"
          policy: "PREFER"
          no-network: "true"

      - name: REQUIRE (valid parent — fail-closed expected)
        id: require
        continue-on-error: true
        uses: Ecocitizenz/ecz-id-mcp-verifier@v0.8.2
        with:
          target: "ECZ-GB-A93K7Q"
          policy: "REQUIRE"
          no-network: "true"

      - name: INVALID input (exit 4 expected)
        id: invalid
        continue-on-error: true
        uses: Ecocitizenz/ecz-id-mcp-verifier@v0.8.2
        with:
          target: "ECZ-GB-EXAMPLE"
          no-network: "true"

      - name: Assert outputs, boundaries and expected failures
        env:
          OPEN_STATE: ${{ steps.open.outputs.result-state }}
          OPEN_REASONS: ${{ steps.open.outputs.reason-codes }}
          OPEN_PRIMARY: ${{ steps.open.outputs.primary-action }}
          PREFER_STATE: ${{ steps.prefer.outputs.result-state }}
          PREFER_HANDOFF: ${{ steps.prefer.outputs.setup-handoff-json }}
          PREFER_TRUSTOPS: ${{ steps.prefer.outputs.trustops-action-url }}
          # The renamed-away output name resolves to empty (it is not exposed):
          PREFER_DEPRECATED: ${{ steps.prefer.outputs.acquisition-flow-json }}
          REQUIRE_OUTCOME: ${{ steps.require.outcome }}
          INVALID_OUTCOME: ${{ steps.invalid.outcome }}
        run: |
          set -euo pipefail
          echo "OPEN result-state:   $OPEN_STATE"
          echo "OPEN reason-codes:   $OPEN_REASONS"
          echo "OPEN primary-action: $OPEN_PRIMARY"
          echo "PREFER result-state: $PREFER_STATE"
          echo "REQUIRE outcome:     $REQUIRE_OUTCOME"
          echo "INVALID outcome:     $INVALID_OUTCOME"

          # Captured outputs present (the renamed public interface)
          [ -n "$OPEN_STATE" ]   || { echo "FAIL: result-state empty"; exit 1; }
          [ -n "$OPEN_REASONS" ] || { echo "FAIL: reason-codes empty"; exit 1; }
          [ -n "$PREFER_HANDOFF" ] || { echo "FAIL: setup-handoff-json empty"; exit 1; }
          [ -n "$PREFER_TRUSTOPS" ] || { echo "FAIL: trustops-action-url empty"; exit 1; }

          # The deprecated output name must be ABSENT (resolves to empty)
          [ -z "$PREFER_DEPRECATED" ] || { echo "FAIL: deprecated output present"; exit 1; }

          # Policy behaviour: REQUIRE fails closed; INVALID rejected (both non-zero)
          [ "$REQUIRE_OUTCOME" = "failure" ] || { echo "FAIL: REQUIRE not fail-closed"; exit 1; }
          [ "$INVALID_OUTCOME" = "failure" ] || { echo "FAIL: INVALID not rejected"; exit 1; }

          echo "ALL ASSERTIONS PASSED"

      - name: Prove no source / repository mutation (read-only run)
        run: |
          echo "git status after action runs:"
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            echo "FAIL: workspace was modified by the action"; exit 1
          fi
          echo "NO REPO MUTATION — working tree clean (permissions: contents: read)"

      - name: Record proof to job summary
        if: always()
        run: |
          {
            echo "## public-action-proof — Ecocitizenz/ecz-id-mcp-verifier@v0.8.2"
            echo ""
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| OPEN result-state | ${{ steps.open.outputs.result-state }} |"
            echo "| OPEN reason-codes | ${{ steps.open.outputs.reason-codes }} |"
            echo "| PREFER setup-handoff-json present | ${{ steps.prefer.outputs.setup-handoff-json != '' }} |"
            echo "| deprecated handoff output present | ${{ steps.prefer.outputs.acquisition-flow-json != '' }} (expect false) |"
            echo "| REQUIRE (fail-closed) outcome | ${{ steps.require.outcome }} |"
            echo "| INVALID (exit 4) outcome | ${{ steps.invalid.outcome }} |"
            echo "| Permissions | contents: read (no write) |"
            echo ""
            echo "The verifier Action also writes its own step summary under each invocation above."
          } >> "$GITHUB_STEP_SUMMARY"

  public-npm-install:
    name: public npm 0.8.2 clean-install proof (accelerators + SARIF + no-secret)
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node.js 20 (public registry)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Clean-install the current latest from the public npm registry and prove behaviour
        run: |
          set -euo pipefail
          fail() { echo "FAIL: $1"; echo "| $1 | FAIL |" >> "$GITHUB_STEP_SUMMARY"; exit 1; }
          TMP="$(mktemp -d)"; cd "$TMP"
          npm init -y >/dev/null 2>&1
          echo "Installing @ecocitizenz/ecz-id-mcp-verifier@0.8.2 from the public registry (no token)..."
          npm install @ecocitizenz/ecz-id-mcp-verifier@0.8.2 --no-audit --no-fund || fail "public npm install failed"

          PKG="node_modules/@ecocitizenz/ecz-id-mcp-verifier"
          BIN="$PKG/dist/bin/cli.js"
          [ -f "$BIN" ] || fail "CLI binary missing"
          VER="$(node -p "require('./$PKG/package.json').version")"
          [ "$VER" = "0.8.2" ] || fail "installed version $VER != 0.8.2"
          node "$BIN" --version | grep -q "v0.8.2" || fail "--version wrong"
          node "$BIN" --help | grep -qi "Usage" || fail "--help missing"
          node "$BIN" --help | grep -q "resolver.ecocitizenz.org" || fail "Resolver route not documented"

          # Registry identity carries the canonical GitHub login casing (capital E).
          MCPNAME="$(node -p "require('./$PKG/package.json').mcpName")"
          [ "$MCPNAME" = "io.github.Ecocitizenz/ecz-id-mcp-verifier" ] || fail "mcpName casing $MCPNAME != canonical"

          # Deterministic offline accelerators (no network, no secret).
          node "$BIN" --doctor          > doctor.json    || fail "--doctor failed"
          node "$BIN" --capabilities    > caps.json      || fail "--capabilities failed"
          node "$BIN" --print-mcp-config > mcpcfg.txt     || fail "--print-mcp-config failed"
          grep -q '"ecz-resolver-posture-v1"' caps.json || fail "capability profile missing"
          grep -q 'io.github.Ecocitizenz/ecz-id-mcp-verifier' caps.json || fail "registry identity absent in capabilities"

          # OPEN and PREFER MUST return 0, so direct execution is safe under `set -e`
          # (OPEN writes open.json, reused by the contract checks below).
          node "$BIN" --target ECZ-CC-ABC123 --policy OPEN   --offline --json > open.json;   OPEN=$?
          node "$BIN" --target ECZ-CC-ABC123 --policy PREFER --offline --json > prefer.json; PREFER=$?
          # REQUIRE (exit 1) and INVALID (exit 4) are EXPECTED non-zero. Capture them via `if`,
          # which consumes the non-zero status so `set -e` does NOT abort before the assignment.
          if node "$BIN" --target ECZ-CC-ABC123 --policy REQUIRE --offline --json > require.json 2> require.err; then
            REQUIRE=0
          else
            REQUIRE=$?
          fi
          if node "$BIN" --target ECZ-GB-EXAMPLE --no-network --json > invalid.json 2> invalid.err; then
            INVALID=0
          else
            INVALID=$?
          fi
          [ "$OPEN" = "0" ]    || fail "OPEN expected 0, got $OPEN"
          [ "$PREFER" = "0" ]  || fail "PREFER expected 0, got $PREFER"
          [ "$REQUIRE" = "1" ] || fail "REQUIRE expected 1, got $REQUIRE"
          [ "$INVALID" = "4" ] || fail "INVALID expected 4, got $INVALID"

          grep -q '"result_state"' open.json || fail "result_state missing"
          grep -q '"reason_codes"' open.json || fail "reason_codes missing"
          grep -q '"recheck_before_reliance": true' open.json || fail "recheck_before_reliance not true"
          grep -q '"verifier_writes_truth": false' open.json || fail "writes_truth not false"
          grep -q '"verifier_marks_bound": false' open.json || fail "marks_bound not false"
          grep -q '"no_source_uploaded": true' open.json || fail "source upload not denied"
          grep -q '"no_secrets_uploaded": true' open.json || fail "secrets upload not denied"
          grep -q '"no_telemetry": true' open.json || fail "telemetry not denied"
          grep -q 'trustops.ecocitizenz.com/start' open.json || fail "TrustOps /start route missing"
          grep -q 'developers.ecocitizenz.com' open.json || fail "Developer Gateway route missing"

          # SARIF 2.1.0 emission (code-scanning-compatible, offline).
          node "$BIN" --target ECZ-CC-ABC123 --policy OPEN --offline --json --sarif out.sarif > /dev/null || fail "SARIF run failed"
          [ -f out.sarif ] || fail "SARIF file not written"
          node -e "const s=require('$TMP/out.sarif');if(s.version!=='2.1.0')throw new Error('sarif version');if(!/sarif/.test(s['\$schema']||''))throw new Error('sarif schema');if(!s.runs||!s.runs.length)throw new Error('sarif runs');if(s.runs[0].tool.driver.name!=='ECZ-ID MCP Verifier')throw new Error('sarif tool');" || fail "SARIF structure invalid"

          # No-secret proof: nothing the verifier wrote may contain a token/secret/cookie value.
          if grep -RniE '(authorization|npm_token|node_auth_token|bearer |ghp_|github_pat_|set-cookie|x-access-token)' \
               open.json prefer.json require.json invalid.json doctor.json caps.json mcpcfg.txt out.sarif; then
            fail "secret-like material found in verifier output"
          fi

          echo "ALL PUBLIC NPM ASSERTIONS PASSED (installed version 0.8.2)"
          {
            echo "## public-npm-install — @ecocitizenz/ecz-id-mcp-verifier@0.8.2"
            echo ""
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| installed version | $VER |"
            echo "| Registry identity (mcpName) | $MCPNAME |"
            echo "| public npm registry install (@0.8.2) | success |"
            echo "| --doctor / --capabilities / --print-mcp-config | success |"
            echo "| capability profile ecz-resolver-posture-v1 | present |"
            echo "| OPEN offline exit | $OPEN |"
            echo "| PREFER offline exit | $PREFER |"
            echo "| REQUIRE offline (fail-closed) exit | $REQUIRE |"
            echo "| INVALID input exit | $INVALID |"
            echo "| result_state / reason_codes / recheck_before_reliance | present |"
            echo "| no truth / no BOUND / no source / no secrets / no telemetry | proven |"
            echo "| SARIF 2.1.0 (ECZ-ID MCP Verifier driver) | emitted + validated |"
            echo "| secret-like material in any output | none |"
            echo "| canonical Resolver + TrustOps /start + Developer Gateway routes | present |"
          } >> "$GITHUB_STEP_SUMMARY"
