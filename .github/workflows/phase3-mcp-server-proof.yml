name: phase3-mcp-server-proof

# Phase 3 MCP server hosted proof. Two jobs:
#   A (bootstrap-lock) regenerates package-lock.json with the pinned MCP SDK
#     1.29.0 + exact Zod and commits it back to the branch (anti-recursion via
#     a [skip lock-bootstrap] marker).
#   B (final-branch-proof) checks out the newest branch head and runs the full
#     gate: typecheck, complete test suite, build, scan:public, Action harness,
#     stdio MCP integration, package inspection, server.json invariants, and
#     best-effort official Registry validation (never login, never publish).
#
# This workflow never publishes npm, never moves a tag/release, and never
# publishes to the MCP Registry.

on:
  push:
    branches: [phase3-mcp-server-eligibility]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: phase3-mcp-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bootstrap-lock:
    name: Job A — bootstrap-lock
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout branch head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Detect anti-recursion marker
        id: guard
        shell: bash
        run: |
          set -euo pipefail
          MSG="$(git log -1 --pretty=%B)"
          if printf '%s' "$MSG" | grep -qF '[skip lock-bootstrap]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Anti-recursion marker present on HEAD; skipping bootstrap."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "No marker; will (re)generate lock if needed."
          fi

      - name: Regenerate package-lock with pinned SDK + Zod
        if: steps.guard.outputs.skip == 'false'
        shell: bash
        run: |
          set -euo pipefail
          # Resolve from the deps already pinned in package.json (no caret).
          npm install --package-lock-only --ignore-scripts
          node -e "const l=require('./package-lock.json');const k=Object.keys(l.packages||{}).find(p=>p.endsWith('node_modules/@modelcontextprotocol/sdk'));if(!k){console.error('SDK not present in lock');process.exit(1);}const v=l.packages[k].version;if(v!=='1.29.0'){console.error('SDK lock version '+v+' != 1.29.0');process.exit(1);}console.log('SDK pinned in lock:',v);const z=Object.keys(l.packages||{}).find(p=>p.endsWith('node_modules/zod'));console.log('zod in lock:',z?l.packages[z].version:'MISSING');"

      - name: Commit lock to branch (anti-recursion marker)
        if: steps.guard.outputs.skip == 'false'
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- package-lock.json package.json; then
            echo "No lock changes to commit."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package-lock.json package.json
          git commit -m "chore(phase3): bootstrap package-lock with pinned MCP SDK 1.29.0 + Zod [skip lock-bootstrap]"
          if git push origin "HEAD:${{ github.ref_name }}"; then
            echo "Lock committed and pushed."
          else
            echo "::error::Branch-token write disabled — cannot push package-lock. Uploading as artifact instead."
            exit 1
          fi

      - name: Upload lock artifact (fallback / record)
        if: always() && steps.guard.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: phase3-package-lock
          path: |
            package.json
            package-lock.json
          if-no-files-found: warn

  final-branch-proof:
    name: Job B — final-branch-proof
    runs-on: ubuntu-latest
    needs: bootstrap-lock
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Fetch + checkout newest branch head (post-bootstrap)
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "${{ github.ref_name }}"
          git checkout -B "${{ github.ref_name }}" "origin/${{ github.ref_name }}"
          echo "HEAD: $(git rev-parse HEAD)"
          git log -1 --pretty=oneline

      - name: Require committed lockfile with pinned SDK
        shell: bash
        run: |
          set -euo pipefail
          test -f package-lock.json || { echo '::error::package-lock.json missing; Job A must run first.'; exit 1; }
          node -e "const l=require('./package-lock.json');const k=Object.keys(l.packages||{}).find(p=>p.endsWith('node_modules/@modelcontextprotocol/sdk'));if(!k||l.packages[k].version!=='1.29.0'){console.error('SDK 1.29.0 not pinned in lock');process.exit(1);}console.log('lock OK — SDK',l.packages[k].version);"

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install (npm ci)
        run: npm ci

      - name: Guard — pinned SDK, no v2 split packages
        shell: bash
        run: |
          set -euo pipefail
          for p in @modelcontextprotocol/server @modelcontextprotocol/client @modelcontextprotocol/node; do
            if [ -d "node_modules/$p" ]; then echo "::error::Forbidden split SDK package present: $p"; exit 1; fi
          done
          node -e "const p=require('@modelcontextprotocol/sdk/package.json');if(p.version!=='1.29.0'){console.error('SDK '+p.version+' != 1.29.0');process.exit(1);}console.log('SDK',p.version)"

      - name: Typecheck
        run: npm run typecheck

      - name: Full test suite (existing + MCP + server.json)
        run: npm test

      - name: Build
        run: npm run build

      - name: Public-disclosure scan
        run: npm run scan:public

      - name: Action regression harness
        run: npm run harness:action

      - name: stdio MCP integration proof
        run: node scripts/mcp-stdio-proof.mjs

      - name: Package inspection (no publish)
        shell: bash
        run: |
          set -euo pipefail
          npm pack --dry-run 2>&1 | tee /tmp/pack.txt
          grep -q 'dist/mcp/stdio.js' /tmp/pack.txt || { echo '::error::dist/mcp/stdio.js not in tarball'; exit 1; }
          grep -q 'server.json' /tmp/pack.txt || { echo '::error::server.json not in tarball'; exit 1; }
          if grep -Eq '(^|[[:space:]/])(src/|tests/|_reference/)' /tmp/pack.txt; then
            echo '::error::forbidden path (src/tests/_reference) in tarball'; exit 1;
          fi

      - name: server.json + mcpName invariants
        shell: bash
        run: |
          set -euo pipefail
          node -e "const p=require('./package.json');const s=require('./server.json');if(p.mcpName!==s.name)throw new Error('mcpName!=server.json.name');if(p.version!==s.version)throw new Error('version mismatch '+p.version+' vs '+s.version);const np=(s.packages||[]).find(x=>x.identifier===p.name);if(!np)throw new Error('npm package identifier missing in server.json');if(np.version!==p.version)throw new Error('server.json package version mismatch');if((np.transport||{}).type!=='stdio')throw new Error('stdio transport missing');console.log('server.json invariants OK')"

      - name: Official Registry metadata validation (HARD GATE — no login, no publish)
        # Authoritative gate: identity/ownership invariants + live validation of
        # server.json against the official schema pinned in its own $schema URL.
        # This step FAILS the job on any issue (no warn-and-continue).
        run: npm run validate:server-json

      - name: mcp-publisher cross-check (informational; never login/publish)
        if: always()
        shell: bash
        run: |
          set -uo pipefail
          echo 'Informational only — the HARD GATE above is authoritative.'
          if command -v mcp-publisher >/dev/null 2>&1; then
            mcp-publisher validate server.json || echo '::notice::mcp-publisher reported issues (informational; hard gate is authoritative).'
          else
            echo '::notice::mcp-publisher CLI not installed on runner; ajv-vs-official-$schema hard gate is authoritative.'
          fi

      - name: Job summary
        if: always()
        shell: bash
        run: |
          {
            echo "# Phase 3 MCP server proof"
            echo ""
            echo "- HEAD: \`$(git rev-parse HEAD)\`"
            echo "- Transport: stdio only · Tools: 3 (ecz_check_target, ecz_recheck_resolver, ecz_explain_result)"
            echo "- SDK pinned: @modelcontextprotocol/sdk@1.29.0"
            echo "- Gate: typecheck · full test suite · build · scan:public · Action harness · stdio integration · package inspect · server.json invariants · **HARD** Registry metadata validation (ajv vs official \$schema; no publish)"
          } >> "$GITHUB_STEP_SUMMARY"
