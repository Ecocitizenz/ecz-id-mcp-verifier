name: Publish to npm (OIDC trusted publishing)

# MANUAL, GATED — the SINGLE sanctioned npm publication path (Stage B / continuing release).
#
# Two operations, selected at dispatch:
#   integrity-proof : build the EXACT candidate tarball from an EXACT commit, run the full
#                     release gate, generate a CycloneDX SBOM, and create GitHub build-provenance
#                     + SBOM attestations. It NEVER publishes. (Phase 5 proof path.)
#   publish-next    : publish the already-prepared, hash-verified tarball under dist-tag `next`.
#                     DISABLED unless the repository variable NPM_RELEASE_WRITE_ENABLED == 'true'
#                     AND the protected environment `npm-release` approves the deployment.
#
# Authentication is npm Trusted Publishing (OIDC) — there is NO long-lived NPM_TOKEN anywhere.
# An ordinary push CANNOT trigger this workflow (workflow_dispatch only). It never publishes to
# `latest`, never creates a Git tag, never creates a GitHub Release, never publishes to the MCP
# Registry, and never publishes from the working source directory — only the prepared tarball.

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Operation to perform
        type: choice
        required: true
        default: integrity-proof
        options:
          - integrity-proof
          - publish-next
      release_commit:
        description: Exact 40-character commit to check out
        required: true
        type: string
      expected_version:
        description: Exact version expected in package.json
        required: true
        default: "0.8.2"
        type: string
      expected_tarball_sha256:
        description: Exact candidate tarball SHA-256
        required: true
        default: "312a59bb1bc4ce678af6d8780f02cddf80cd877f283ab7c25741e165b5251043"
        type: string

# Global default: read-only. No repository-write permission is granted globally.
permissions:
  contents: read

concurrency:
  group: publish-npm
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  NPM_VERSION: "11.17.0"
  PKG_NAME: "@ecocitizenz/ecz-id-mcp-verifier"
  PKG_REPO: "Ecocitizenz/ecz-id-mcp-verifier"
  RELEASE_BRANCH_REF: "refs/heads/release/npm-0.8.2-registry-edition"
  CANDIDATE_TARBALL_SHA256: "312a59bb1bc4ce678af6d8780f02cddf80cd877f283ab7c25741e165b5251043"
  SBOM_FILE: "ecz-id-mcp-verifier-0.8.2.cdx.json"
  ARTIFACT_NAME: "ecz-id-prepared-0.8.2"

jobs:
  prepare:
    # Runs for BOTH operations. Builds + proves + attests the exact artifact. Never publishes.
    name: prepare · integrity · attest (no publish)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      tarball: ${{ steps.pack.outputs.tarball }}
      tarball_sha256: ${{ steps.hash.outputs.tarball_sha256 }}
      sbom_sha256: ${{ steps.sbom.outputs.sbom_sha256 }}
      lock_sha256: ${{ steps.hash.outputs.lock_sha256 }}
    steps:
      - name: Validate release_commit is a full 40-character lowercase SHA
        run: |
          COMMIT="${{ inputs.release_commit }}"
          if ! printf '%s' "$COMMIT" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "::error::release_commit must be a full 40-character lowercase hex SHA (got: $COMMIT)"
            exit 1
          fi
          echo "release_commit OK: $COMMIT"

      - name: Checkout exact release commit (clean, no persisted credentials)
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_commit }}
          persist-credentials: false
          fetch-depth: 1

      - name: Verify checked-out SHA equals release_commit
        run: |
          ACTUAL="$(git rev-parse HEAD)"
          echo "checked_out_sha=$ACTUAL"
          if [ "$ACTUAL" != "${{ inputs.release_commit }}" ]; then
            echo "::error::checked-out SHA $ACTUAL != input ${{ inputs.release_commit }}"
            exit 1
          fi

      - name: Set up Node 24 (no dependency cache)
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Pin npm 11.17.0
        run: |
          npm install -g "npm@${NPM_VERSION}"
          INSTALLED="$(npm --version)"
          echo "npm=$INSTALLED"
          if [ "$INSTALLED" != "$NPM_VERSION" ]; then
            echo "::error::npm $INSTALLED != required $NPM_VERSION"
            exit 1
          fi

      - name: Verify version, package name and repository identity
        run: |
          node -e '
            const p = require("./package.json");
            const fail = (m) => { console.error("::error::" + m); process.exit(1); };
            const expVer = process.env.EXPECTED_VERSION;
            if (p.version !== expVer) fail("package.json version " + p.version + " != input " + expVer);
            if (p.version !== "0.8.2") fail("package.json version must be 0.8.2, got " + p.version);
            if (p.name !== process.env.PKG_NAME) fail("package name " + p.name + " != " + process.env.PKG_NAME);
            const url = (p.repository && p.repository.url) || "";
            if (!url.includes("Ecocitizenz/ecz-id-mcp-verifier")) fail("repository.url does not identify the repo: " + url);
            if (!p.publishConfig || p.publishConfig.access !== "public") fail("publishConfig.access must be public");
            console.log("identity OK:", p.name, p.version, url);
          '
        env:
          EXPECTED_VERSION: ${{ inputs.expected_version }}

      - name: Clean install from lockfile
        run: npm ci

      - name: Fail on lockfile drift
        run: |
          if ! git diff --quiet -- package-lock.json; then
            echo "::error::package-lock.json changed during npm ci (lockfile drift)"
            git --no-pager diff -- package-lock.json
            exit 1
          fi
          echo "lockfile stable"

      - name: Full release gate (release:full)
        run: npm run release:full

      - name: Pack the npm tarball once
        id: pack
        run: |
          npm pack --json > pack.json
          TARBALL="$(node -e 'console.log(require("./pack.json")[0].filename)')"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          echo "packed: $TARBALL"
          ls -l "$TARBALL"

      - name: Inventory and scan the tarball
        run: |
          TARBALL="${{ steps.pack.outputs.tarball }}"
          tar -tzf "$TARBALL" | sort > tarball-inventory.txt
          echo "----- tarball inventory -----"
          cat tarball-inventory.txt
          if grep -Eq '(^|/)(src/|tests/|scripts/|_EVIDENCE/|\.github/|node_modules/)' tarball-inventory.txt; then
            echo "::error::tarball contains disallowed paths (source/tests/scripts/evidence/workflows/node_modules)"
            exit 1
          fi
          if grep -Eq '\.cdx\.json$|sbom' tarball-inventory.txt; then
            echo "::error::SBOM must NOT be inside the npm tarball"
            exit 1
          fi

      - name: Record and ENFORCE tarball + lockfile SHA-256
        id: hash
        run: |
          TARBALL="${{ steps.pack.outputs.tarball }}"
          SHA="$(sha256sum "$TARBALL" | awk '{print $1}')"
          LOCK="$(sha256sum package-lock.json | awk '{print $1}')"
          echo "tarball_sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "lock_sha256=$LOCK" >> "$GITHUB_OUTPUT"
          echo "tarball_sha256=$SHA"
          echo "lock_sha256=$LOCK"
          if [ "$SHA" != "${{ inputs.expected_tarball_sha256 }}" ]; then
            echo "::error::tarball sha256 $SHA != expected input ${{ inputs.expected_tarball_sha256 }}"
            exit 1
          fi
          if [ "$SHA" != "${CANDIDATE_TARBALL_SHA256}" ]; then
            echo "::error::tarball sha256 $SHA != pinned candidate hash ${CANDIDATE_TARBALL_SHA256}"
            exit 1
          fi
          printf '%s  %s\n' "$SHA" "$TARBALL" > tarball.sha256
          printf '%s  %s\n' "$LOCK" "package-lock.json" > package-lock.sha256
          echo "tarball + lockfile hashes enforced"

      - name: Generate CycloneDX SBOM (runtime, omit dev)
        id: sbom
        run: |
          npm sbom --sbom-format=cyclonedx --sbom-type=library --omit=dev > "${SBOM_FILE}"
          node -e '
            const s = require("./" + process.env.SBOM_FILE);
            const fail = (m) => { console.error("::error::" + m); process.exit(1); };
            if (s.bomFormat !== "CycloneDX") fail("SBOM bomFormat is not CycloneDX: " + s.bomFormat);
            if (!s.specVersion) fail("SBOM missing specVersion");
            if (!Array.isArray(s.components)) fail("SBOM missing components[]");
            console.log("SBOM CycloneDX", s.specVersion, "components:", s.components.length);
          '
          SBSHA="$(sha256sum "${SBOM_FILE}" | awk '{print $1}')"
          echo "sbom_sha256=$SBSHA" >> "$GITHUB_OUTPUT"
          printf '%s  %s\n' "$SBSHA" "${SBOM_FILE}" > sbom.sha256
          echo "sbom_sha256=$SBSHA"

      - name: Attest build provenance for the exact tarball
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.pack.outputs.tarball }}

      - name: Attest SBOM (bind the exact tarball to the CycloneDX SBOM)
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.pack.outputs.tarball }}
          sbom-path: ${{ env.SBOM_FILE }}

      - name: Upload one prepared artifact (tarball + SBOM + inventory + hashes)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            *.tgz
            ${{ env.SBOM_FILE }}
            tarball-inventory.txt
            tarball.sha256
            package-lock.sha256
            sbom.sha256
          if-no-files-found: error
          retention-days: 30

  publish-next:
    # DISABLED in Phase 5. Publishes ONLY the prepared tarball under `next`, never `latest`.
    # Guarded by: operation == publish-next  AND  kill switch == 'true'  AND  release branch.
    # The protected environment `npm-release` (required reviewer + branch restriction) is the
    # human gate. NPM_RELEASE_WRITE_ENABLED is 'false' during Phase 5, so this job is SKIPPED.
    name: publish · next (disabled unless kill switch enabled)
    needs: prepare
    if: >-
      ${{
        inputs.operation == 'publish-next' &&
        vars.NPM_RELEASE_WRITE_ENABLED == 'true' &&
        github.ref == 'refs/heads/release/npm-0.8.2-registry-edition'
      }}
    runs-on: ubuntu-latest
    environment: npm-release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Re-validate release_commit is a full 40-character lowercase SHA
        run: |
          COMMIT="${{ inputs.release_commit }}"
          if ! printf '%s' "$COMMIT" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "::error::release_commit must be a full 40-character lowercase hex SHA"
            exit 1
          fi

      - name: Set up Node 24 (no dependency cache)
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Pin npm 11.17.0
        run: |
          npm install -g "npm@${NPM_VERSION}"
          INSTALLED="$(npm --version)"
          if [ "$INSTALLED" != "$NPM_VERSION" ]; then
            echo "::error::npm $INSTALLED != required $NPM_VERSION"
            exit 1
          fi

      - name: Download the exact prepared artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: prepared

      - name: Re-verify tarball SHA-256 and version before publish
        id: reverify
        working-directory: prepared
        run: |
          TARBALL="$(ls *.tgz)"
          SHA="$(sha256sum "$TARBALL" | awk '{print $1}')"
          echo "reverify tarball=$TARBALL sha=$SHA"
          if [ "$SHA" != "${{ inputs.expected_tarball_sha256 }}" ]; then
            echo "::error::prepared tarball sha $SHA != expected ${{ inputs.expected_tarball_sha256 }}"
            exit 1
          fi
          if [ "$SHA" != "${CANDIDATE_TARBALL_SHA256}" ]; then
            echo "::error::prepared tarball sha $SHA != pinned candidate ${CANDIDATE_TARBALL_SHA256}"
            exit 1
          fi
          if ! tar -xzO -f "$TARBALL" package/package.json > extracted-package.json 2>/dev/null; then
            echo "::error::could not extract package/package.json from $TARBALL"
            exit 1
          fi
          VER="$(node -e 'const fs=require("fs");const s=fs.readFileSync("extracted-package.json","utf8");if(!s.trim()){console.error("::error::empty package.json in tarball");process.exit(1)}console.log(JSON.parse(s).version)')"
          echo "tarball_version=$VER"
          if [ "$VER" != "${{ inputs.expected_version }}" ] || [ "$VER" != "0.8.2" ]; then
            echo "::error::tarball version $VER is not 0.8.2 / expected"
            exit 1
          fi
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Publish the downloaded tarball under dist-tag next (NEVER latest)
        working-directory: prepared
        # OIDC trusted publishing — no NODE_AUTH_TOKEN / NPM_TOKEN. Provenance is automatic.
        run: |
          npm publish "${{ steps.reverify.outputs.tarball }}" --tag next --access public
