name: Publish to npm (OIDC trusted publishing)

# PREPARED — DISABLED. This workflow performs a real npm publish and MUST NOT run in
# this phase. It is the CONTINUING-RELEASE path (Stage B) for FUTURE versions only.
#
# Current state: the package ALREADY EXISTS — npm @ecocitizenz/ecz-id-mcp-verifier@0.7.0
# is published and the first manual bootstrap publication is COMPLETE. This workflow does
# NOT republish 0.7.0 and is not used to create the package.
#
# Future publishing stays DISABLED until BOTH are configured:
#   1. the npm Trusted Publisher is registered for this package (org/user, repo, this
#      workflow file name, environment `npm-release`); and
#   2. the protected GitHub environment `npm-release` exists with required reviewers.
# Only then add `release: { types: [published] }` to `on:` for a future tagged release.
#
# It uses npm Trusted Publishing (OIDC) — NOT a long-lived NPM_TOKEN. Trusted publishing
# requires npm CLI >= 11.5.1 on the runner and a public repository for provenance
# (provenance is automatic). No publication occurs in this phase.

on:
  # Manual, gated trigger only. Add `release: { types: [published] }` in Phase 2
  # once the Trusted Publisher is registered and the environment is protected.
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing only

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    name: release-check · publish (provenance)
    runs-on: ubuntu-latest
    environment: npm-release # protected: requires reviewer approval
    steps:
      - name: Checkout (clean)
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm supports trusted publishing (>= 11.5.1)
        run: npm install -g npm@latest

      - name: Install (clean, from lockfile)
        run: npm ci

      - name: Full release gate (typecheck · test · build · scan)
        run: npm run release:check

      - name: Publish (public, provenance via OIDC trusted publishing)
        # No NODE_AUTH_TOKEN / NPM_TOKEN. Authentication is short-lived OIDC.
        # publishConfig.access=public and provenance:true are set in package.json.
        run: npm publish
